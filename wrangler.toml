name = "git-lfs-s3-proxy"
main = "./_worker.js"
compatibility_date = "2026-03-02"

[limits]
cpu_ms = 300_000

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1